<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 Mechan-Cup HUD</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap');
    
    body {
      margin: 0; padding: 0; background: transparent; color: #e0e0e0;
      font-family: 'Kanit', sans-serif; overflow: hidden;
      text-transform: uppercase;
    }
    .container {
      display: flex; justify-content: space-between; padding: 20px 40px;
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    }
    .team {
      background: rgba(15, 15, 15, 0.9); 
      padding: 12px; border-radius: 2px; min-width: 400px;
      border-bottom: 3px solid #333;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .ct { border-top: 4px solid #4f94f9; }
    .t  { border-top: 4px solid #f9a64f; }
    .players { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }
    .player {
      display: flex; align-items: center; background: rgba(40, 40, 40, 0.6);
      padding: 8px 12px; font-size: 14px;
    }
    .player.dead { opacity: 0.3; filter: grayscale(1); }
    .avatar { width: 38px; height: 38px; border: 1px solid #444; margin-right: 12px; object-fit: cover; }
    .info { flex: 1; }
    .name { font-weight: 600; font-size: 16px; color: #fff; }
    .stats { font-size: 12px; display: flex; gap: 15px; }
    .kda { color: #888; }
    .ammo { font-weight: 700; color: #f9a64f; }
    .hp-bar { height: 4px; background: #222; margin-top: 6px; }
    .hp { height: 100%; background: #fff; transition: width 0.4s ease; }
    .health-value { font-size: 24px; font-weight: 700; line-height: 1; color: #fff; }
    .armor-value { font-size: 12px; color: #888; text-align: right; }
    .round-info {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      background: #0f0f0f; padding: 10px 40px; border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px; text-align: center; border: 1px solid #333;
      box-shadow: 0 5px 20px rgba(0,0,0,0.8);
    }
    #score { font-size: 28px; font-weight: 700; color: #fff; margin: 0 15px; }
    #roundNum { color: #f9a64f; font-size: 14px; }
    .team-label { font-weight: 700; font-size: 20px; color: #fff; }
  </style>
</head>
<body>

  <div class="round-info" id="roundInfo">
    <span id="roundNum">ROUND 1</span>
    <span id="score">0 - 0</span>
  </div>

  <div class="container">
    <div class="team ct" id="ctTeam">
      <div class="team-label" id="ctName">COUNTER-TERRORISTS</div>
      <div class="players" id="ctPlayers"></div>
    </div>
    <div class="team t" id="tTeam" style="text-align:right;">
      <div class="team-label" id="tName">TERRORISTS</div>
      <div class="players" id="tPlayers"></div>
    </div>
  </div>

  <script>
    const socket = io("http://localhost:1349");

    socket.on("connect", () => {
      socket.emit("started");
      socket.emit("register", "simple-hud", false, "cs2", "overlay");
    });

    socket.on("update", (data) => {
      if (!data?.allplayers || !data?.map) return;

      const players = data.allplayers;
      const map = data.map;

      document.getElementById("score").textContent = `${map.team_ct.score} - ${map.team_t.score}`;
      
      // FIX: Dodajemy +1 do rundy, skoro liczy od 0
      const currentRound = (parseInt(map.round) || 0) + 1;
      document.getElementById("roundNum").textContent = `ROUND ${currentRound}`;

      const ctPlayers = [];
      const tPlayers = [];

      Object.values(players).forEach(p => {
        if (p.team === "CT") ctPlayers.push(p);
        else if (p.team === "T") tPlayers.push(p);
      });

      renderTeam("ct", ctPlayers);
      renderTeam("t", tPlayers);
    });

    function renderTeam(side, playerList) {
      const container = document.getElementById(side + "Players");
      container.innerHTML = "";

      playerList.forEach(p => {
        const isDead = p.state.health <= 0;
        const div = document.createElement("div");
        div.className = `player ${isDead ? "dead" : ""}`;
        const hpPercent = p.state.health || 0;
        let hpColor = "#fff";
        if (hpPercent < 30) hpColor = "#ff4d4d";

        div.innerHTML = `
          <img src="${p.extra?.avatar || 'https://via.placeholder.com/42'}" class="avatar" onerror="this.src='https://via.placeholder.com/42'">
          <div class="info" style="text-align:left;">
            <div class="name">${p.name}</div>
            <div class="stats">
              <span class="kda">${p.stats?.kills || 0} / ${p.stats?.deaths || 0}</span>
              <span class="ammo">${p.weapons?.weapon_0?.ammo_clip || "-"} / ${p.weapons?.weapon_0?.ammo_reserve || "-"}</span>
            </div>
            <div class="hp-bar"><div class="hp" style="width: ${hpPercent}%; background: ${hpColor};"></div></div>
          </div>
          <div style="text-align:right; min-width:60px; margin-left: 10px;">
            <div class="health-value">${p.state.health}</div>
            <div class="armor-value">AP: ${p.state.armor || 0}</div>
          </div>
        `;
        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
